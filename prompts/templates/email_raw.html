<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{SUBJECT}}</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            color: #333333;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        .header-table {
            width: 100%;
            border-bottom: 2px solid #e1e4e8;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }
        .header-item {
            font-size: 14px;
            padding: 3px 0;
            display: flex;
        }
        .header-label {
            font-weight: bold;
            color: #555555;
            width: 80px;
            min-width: 80px;
        }
        .header-value {
            color: #000000;
        }
        .subject-line {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            color: #000000;
        }
        .body-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
            color: #000000;
            margin-top: 10px;
        }
        .footer {
            margin-top: 50px;
            padding-top: 10px;
            border-top: 1px solid #eeeeee;
            font-size: 11px;
            color: #999999;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-table">
            <div class="header-item">
                <span class="header-label">보낸 사람:</span>
                <span class="header-value">{{SENDER}}</span>
            </div>
            <div class="header-item">
                <span class="header-label">받은 날짜:</span>
                <span class="header-value">{{DATE}}</span>
            </div>
            <div class="subject-line">{{SUBJECT}}</div>
        </div>
        
        <div class="body-content">
{{BODY}}
        </div>
        
        <div class="footer">
            본 문서는 피아니(Peani) 시스템에 의해 안전하게 보관되었습니다.
        </div>
    </div>
</body>
</html>
